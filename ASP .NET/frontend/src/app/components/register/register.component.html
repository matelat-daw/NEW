<div class="min-vh-100 d-flex align-items-center justify-content-center py-5 px-3">
    <div class="w-100" style="max-width: 900px;">
        <div class="card border-0 rounded-4 shadow-lg overflow-hidden">
            <div class="card-header bg-dark text-white py-4 border-0 text-center">
                <i class="fas fa-user-plus fa-3x mb-3 text-primary"></i>
                <h3 class="mb-0 fw-bold">Create <span class="text-primary">Account</span></h3>
                <p class="text-muted small mb-0 mt-2">Join our management platform</p>
            </div>
            <div class="card-body p-5">
                <form id="registerForm" class="needs-validation">
                    <!-- Nick (Username) -->
                    <div class="mb-3">
                        <label for="nickInput" class="form-label">
                            <i class="fas fa-at"></i> Username
                        </label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="nickInput" 
                            name="nick"
                            placeholder="john_doe"
                            autocomplete="off">
                    </div>

                    <!-- Name (First Name) -->
                    <div class="mb-3">
                        <label for="nameInput" class="form-label">
                            <i class="fas fa-user"></i> First Name
                        </label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="nameInput" 
                            name="name"
                            placeholder="John"
                            autocomplete="off">
                    </div>

                    <!-- Surname1 (First Surname) -->
                    <div class="mb-3">
                        <label for="surname1Input" class="form-label">
                            <i class="fas fa-user"></i> First Surname
                        </label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="surname1Input" 
                            name="surname1"
                            placeholder="Doe"
                            autocomplete="off">
                    </div>

                    <!-- Surname2 (Second Surname) - Optional -->
                    <div class="mb-3">
                        <label for="surname2Input" class="form-label">
                            <i class="fas fa-user"></i> Second Surname (Optional)
                        </label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="surname2Input" 
                            name="surname2"
                            placeholder="Smith"
                            autocomplete="off">
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label for="emailInput" class="form-label">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="emailInput" 
                            name="email"
                            placeholder="john@example.com"
                            autocomplete="off">
                    </div>

                    <!-- Phone -->
                    <div class="mb-3">
                        <label for="phoneInput" class="form-label">
                            <i class="fas fa-phone"></i> Phone
                        </label>
                        <input 
                            type="tel" 
                            class="form-control" 
                            id="phoneInput" 
                            name="phone"
                            placeholder="1234567890"
                            autocomplete="off">
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label for="passwordInput" class="form-label">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="passwordInput" 
                            name="password"
                            placeholder="Minimum 6 characters"
                            autocomplete="new-password">
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-3">
                        <label for="confirmPasswordInput" class="form-label">
                            <i class="fas fa-lock"></i> Confirm Password
                        </label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="confirmPasswordInput" 
                            name="confirmPassword"
                            placeholder="Repeat your password"
                            autocomplete="new-password">
                    </div>

                    <!-- Gender -->
                    <div class="mb-3">
                        <label for="genderSelect" class="form-label">
                            <i class="fas fa-venus-mars"></i> Gender
                        </label>
                        <select class="form-select" id="genderSelect" name="gender">
                            <option value="">Select your gender</option>
                            <option value="MALE">Male</option>
                            <option value="FEMALE">Female</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>

                    <!-- Birth Date (Optional) -->
                    <div class="mb-3">
                        <label for="bdayInput" class="form-label">
                            <i class="fas fa-calendar-alt"></i> Birth Date (Optional)
                        </label>
                        <input 
                            type="date" 
                            class="form-control" 
                            id="bdayInput" 
                            name="bday"
                            autocomplete="off">
                    </div>

                    <!-- Profile Picture (Optional) -->
                    <div class="mb-3">
                        <label for="profilePictureInput" class="form-label">
                            <i class="fas fa-image"></i> Profile Picture (Optional)
                        </label>
                        <input 
                            type="file" 
                            class="form-control" 
                            id="profilePictureInput" 
                            name="profilePicture"
                            accept="image/png,image/jpeg,image/jpg,image/gif,image/webp"
                            autocomplete="off">
                        <small class="text-muted d-block mt-2">
                            Accepted formats: PNG, JPG, JPEG, GIF, WebP. Max size: 20MB
                        </small>
                        <div id="imagePreview" class="mt-3" style="display: none;">
                            <img id="previewImage" src="" alt="Preview" style="max-width: 150px; max-height: 150px; border-radius: 8px; border: 2px solid #ddd;">
                        </div>
                    </div>

                    <!-- Checkbox Terms -->
                    <div class="mb-3 form-check">
                        <input 
                            type="checkbox" 
                            class="form-check-input" 
                            id="termsCheckbox"
                            name="terms">
                        <label class="form-check-label" for="termsCheckbox">
                            I accept the <button type="button" class="btn btn-link p-0 align-baseline text-primary text-decoration-none">terms and conditions</button>
                        </label>
                    </div>

                    <!-- Buttons -->
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-check-circle"></i> Register
                        </button>
                        <button type="reset" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Clear
                        </button>
                    </div>

                    <!-- Login Link -->
                    <div class="text-center mt-3">
                        <small>
                            Already have an account? 
                            <a href="/login" class="text-primary fw-bold">Sign in here</a>
                        </small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
