# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/clients?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&allowLoadLocalInfile=false&allowUrlInLocalInfile=false&allowLoadLocalInfileInPath=/&maxAllowedPacket=655360
spring.datasource.username=root
spring.datasource.password=${MySQL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
jwt.secret=${JWT-Secret}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${Matelat-Gmail-User}
spring.mail.password=${Matelat-Gmail-Pass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email from address
mail.from=noreply@clients.com
mail.app-name=Clients API

# Application Configuration
app.frontend.url=http://localhost
app.backend.url=http://localhost:8080
app.frontend.login-url=http://localhost/login
app.frontend.register-url=http://localhost/register

# File Upload Limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Upload Directory Configuration
# Ruta absoluta para garantizar que encuentra las imagenes sin importar desde donde se ejecute
# Si UPLOAD_DIR no está definida, usa la ruta absoluta de prueba
upload.dir=${UPLOAD_DIR:d:/TMP/Clients/uploads}

# Logging
logging.level.root=INFO
logging.level.com.futureprograms.clients=INFO
logging.level.org.springframework.security=WARN

# Actuator Health
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized