<div class="spa-fragment users-fragment">
    <!-- Main Content -->
    <div class="main-content py-5 mb-6" style="min-height: calc(100vh - 120px);">
        <div class="container py-5">
            <!-- Título -->
            <div class="row mb-5">
                <div class="col-12">
                    <h1 class="display-5 fw-bold mb-2">
                        <i class="fas fa-users me-3"></i>Lista de Usuarios
                    </h1>
                    <p class="text-muted">Administra los usuarios del sistema</p>
                </div>
            </div>

            <!-- Vista para ADMIN -->
            <div id="adminView" class="d-none">
                <div class="row">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-body text-center py-5">
                                <i class="fas fa-list display-1 text-primary mb-3"></i>
                                <h2 class="card-title mb-3">Lista de Usuarios</h2>
                                <p class="text-muted mb-0">Esta funcionalidad está en desarrollo</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Vista para NO ADMIN (Acceso Denegado) -->
            <div id="noAdminView">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card shadow-sm border-warning">
                            <div class="card-body text-center py-5">
                                <div style="font-size: 80px; margin-bottom: 20px;">🔐</div>
                                <h2 class="card-title fw-bold mb-3 text-danger">Acceso Denegado</h2>
                                <p class="lead mb-3">No tienes permisos para acceder a esta sección</p>
                                <p class="text-muted mb-4">
                                    <i class="fas fa-info-circle me-2"></i>
                                    <strong>Esta funcionalidad solo está disponible para usuarios con rol ADMIN</strong>
                                </p>
                                
                                <div class="alert alert-info" role="alert">
                                    <i class="fas fa-user-circle me-2"></i>
                                    <strong>Tu rol actual:</strong> <span id="userRoleDisplay" class="badge bg-info ms-2">Cargando...</span>
                                </div>

                                <a href="/dashboard" class="btn btn-primary mt-3">
                                    <i class="fas fa-arrow-left me-2"></i>Volver al Dashboard
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
