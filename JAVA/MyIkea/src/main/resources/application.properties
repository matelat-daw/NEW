spring.application.name=MyIkea
server.port=${PORT:8080}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# Active profiles based on environment
# En desarrollo: spring.profiles.active=dev (por defecto)
# En producción: spring.profiles.active=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# Default values (overridden by profile-specific files)
spring.datasource.url=jdbc:mysql://localhost:3306/myikea
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Configuracion de recursos estaticos
# No lanzar excepcion si la imagen no existe (sera manejada por ImageFallbackController)
spring.web.resources.add-mappings=true
server.error.whitelabel.enabled=true

# Suprimir logs innecesarios de recursos no encontrados
logging.level.org.springframework.web.servlet.resource=WARN

# Configuracion de carga de archivos (multipart)
# Limite de tamaño maximo para archivo individual
spring.servlet.multipart.max-file-size=10MB
# Limite de tamaño maximo para la solicitud completa
spring.servlet.multipart.max-request-size=10MB

# Origen permitido para el frontend desacoplado
app.frontend.allowed-origin=${FRONTEND_ORIGIN:http://localhost:5173}
app.frontend.allowed-origins=${FRONTEND_ORIGINS:${app.frontend.allowed-origin},http://localhost}

# JWT para endpoints API (cookie HttpOnly)
app.security.jwt.secret=${JWT_SECRET:change-this-secret-in-production-change-this-secret}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
app.security.jwt.cookie-name=${JWT_COOKIE_NAME:MYIKEA_AUTH_TOKEN}
app.security.jwt.cookie-secure=${JWT_COOKIE_SECURE:false}

# JWT robusto (access + refresh con rotación)
app.security.jwt.access.secret=${JWT_ACCESS_SECRET:${JWT_SECRET:change-this-secret-in-production-change-this-secret}}
app.security.jwt.refresh.secret=${JWT_REFRESH_SECRET:${app.security.jwt.access.secret}}
app.security.jwt.access.expiration-seconds=${JWT_ACCESS_EXPIRATION_SECONDS:900}
app.security.jwt.refresh.expiration-seconds=${JWT_REFRESH_EXPIRATION_SECONDS:604800}
app.security.jwt.access.cookie-name=${JWT_ACCESS_COOKIE_NAME:${JWT_COOKIE_NAME:MYIKEA_AUTH_TOKEN}}
app.security.jwt.refresh.cookie-name=${JWT_REFRESH_COOKIE_NAME:MYIKEA_REFRESH_TOKEN}
app.security.jwt.cookie-same-site=${JWT_COOKIE_SAME_SITE:Lax}